name: Update README activity

on:
  schedule:
    # 06:17 UTC every day. Off-hour cadence keeps the diff out of
    # business-day noise and avoids the top-of-hour API spike.
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh Recent Activity block
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_readme.py

      - name: Commit + push if changed
        run: |
          if [[ -z "$(git status --porcelain README.md)" ]]; then
            echo "no README changes, nothing to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(readme): refresh Recent Activity block"
          git push
