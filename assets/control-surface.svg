    <circle cx="752" cy="197" r="7" fill="#2DD4BF"/>
    <circle cx="752" cy="271" r="7" fill="#F59E0B"/>

    <text x="776" y="118" fill="#93C5FD" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="2">LANE 01</text>
    <text x="776" y="194" fill="#99F6E4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="2">LANE 02</text>
    <text x="776" y="268" fill="#FDE68A" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="2">LANE 03</text>

    <text x="776" y="138" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="600">AI Governance</text>
    <text x="776" y="212" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="600">Quant Systems</text>
    <text x="776" y="286" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="600">Agent Evaluation</text>

    <text x="983" y="138" fill="#CBD5E1" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15">auditability, policy, risk</text>
    <text x="983" y="212" fill="#CBD5E1" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15">order books, pricing, latency</text>
    <text x="983" y="286" fill="#CBD5E1" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15">cost, safety, behavior</text>
  </g>

  <path d="M593 249C665 249 660 122 720 122" stroke="url(#lineA)" stroke-width="3" stroke-linecap="round" opacity="0.95"/>
  <path d="M593 249C675 249 655 196 720 196" stroke="url(#lineB)" stroke-width="3" stroke-linecap="round" opacity="0.95"/>
  <path d="M593 249C690 249 645 270 720 270" stroke="url(#lineC)" stroke-width="3" stroke-linecap="round" opacity="0.95"/>

  <circle cx="593" cy="249" r="8" fill="#E2E8F0"/>
  <circle cx="593" cy="249" r="18" fill="none" stroke="#E2E8F0" opacity="0.35"/>

  <text x="72" y="318" fill="#7DD3FC" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">PRIMARY STACK  /  PYTHON  /  C++20  /  TYPESCRIPT  /  SQL</text>
</svg>
