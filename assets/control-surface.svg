<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Atharva Joshi Control Surface</title>
  <desc id="desc">Profile header showing AI governance, quant systems, and agent evaluation as the three operating lanes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.55" stop-color="#0A1A30"/>
      <stop offset="1" stop-color="#0F2740"/>
    </linearGradient>
    <linearGradient id="lineA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="lineB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="lineC" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="24" fill="url(#bg)"/>

  <g opacity="0.18">
    <path d="M0 40H1280" stroke="#93C5FD" stroke-width="1"/>
    <path d="M0 100H1280" stroke="#93C5FD" stroke-width="1"/>
    <path d="M0 160H1280" stroke="#93C5FD" stroke-width="1"/>
    <path d="M0 220H1280" stroke="#93C5FD" stroke-width="1"/>
    <path d="M0 280H1280" stroke="#93C5FD" stroke-width="1"/>
    <path d="M90 0V360" stroke="#93C5FD" stroke-width="1"/>
    <path d="M230 0V360" stroke="#93C5FD" stroke-width="1"/>
    <path d="M370 0V360" stroke="#93C5FD" stroke-width="1"/>
    <path d="M510 0V360" stroke="#93C5FD" stroke-width="1"/>
    <path d="M650 0V360" stroke="#93C5FD" stroke-width="1"/>
    <path d="M790 0V360" stroke="#93C5FD" stroke-width="1"/>
    <path d="M930 0V360" stroke="#93C5FD" stroke-width="1"/>
    <path d="M1070 0V360" stroke="#93C5FD" stroke-width="1"/>
    <path d="M1210 0V360" stroke="#93C5FD" stroke-width="1"/>
  </g>

  <circle cx="1110" cy="56" r="42" fill="#0B1F34" stroke="#1E3A5F" stroke-width="1.5"/>
  <circle cx="1110" cy="56" r="26" fill="none" stroke="#2DD4BF" stroke-width="2" opacity="0.85"/>
  <circle cx="1110" cy="56" r="7" fill="#2DD4BF" filter="url(#glow)"/>
  <path d="M1110 14V0M1110 112V98M1152 56H1166M1054 56H1068" stroke="#60A5FA" stroke-width="1.5" opacity="0.75"/>

  <text x="72" y="86" fill="#E5F0FF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" letter-spacing="3">ATHARVA JOSHI</text>
  <text x="72" y="152" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="48" font-weight="700">Operating Under Constraint</text>
  <text x="72" y="192" fill="#93C5FD" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="19">ML systems for regulated environments, fast markets, and agent reliability.</text>

  <rect x="72" y="232" width="150" height="34" rx="17" fill="#0D2237" stroke="#1D4ED8"/>
  <rect x="238" y="232" width="130" height="34" rx="17" fill="#0D2237" stroke="#14B8A6"/>
  <rect x="384" y="232" width="156" height="34" rx="17" fill="#0D2237" stroke="#F59E0B"/>
  <text x="100" y="254" fill="#DBEAFE" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">governance</text>
  <text x="277" y="254" fill="#CCFBF1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">quant</text>
  <text x="414" y="254" fill="#FEF3C7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">evaluation</text>

  <g>
    <rect x="720" y="94" width="470" height="58" rx="14" fill="#0A1829" stroke="#1D4ED8" stroke-width="1.5"/>
    <rect x="720" y="168" width="470" height="58" rx="14" fill="#0A1829" stroke="#14B8A6" stroke-width="1.5"/>
    <rect x="720" y="242" width="470" height="58" rx="14" fill="#0A1829" stroke="#F59E0B" stroke-width="1.5"/>

