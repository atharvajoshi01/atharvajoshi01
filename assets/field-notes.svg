<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Atharva Joshi Studio Board</title>
  <desc id="desc">A clean personal studio board showing Atharva Joshi's three focus areas: AI governance, quant systems, and agent evaluation.</desc>
  <defs>
    <pattern id="grain" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="5" r="1" fill="#8C7D69"/>
      <circle cx="13" cy="9" r="1" fill="#8C7D69"/>
      <circle cx="8" cy="16" r="1" fill="#8C7D69"/>
    </pattern>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#3F2C1F" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="24" fill="#EEE3CF"/>
  <rect width="1280" height="360" rx="24" fill="url(#grain)" opacity="0.08"/>

  <rect x="58" y="42" width="446" height="276" rx="22" fill="#FFFCF6" stroke="#D6C8B4" stroke-width="2" filter="url(#cardShadow)"/>
  <rect x="94" y="40" width="110" height="30" rx="8" fill="#D79472" opacity="0.85"/>
  <text x="94" y="96" fill="#935338" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="2">STUDIO BOARD</text>
  <text x="94" y="158" fill="#17202A" font-family="Georgia, Times New Roman, serif" font-size="56" font-weight="700">Atharva</text>
  <text x="94" y="218" fill="#17202A" font-family="Georgia, Times New Roman, serif" font-size="56" font-weight="700">Joshi</text>
  <text x="94" y="252" fill="#44515D" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24">Builds ML systems where</text>
  <text x="94" y="281" fill="#44515D" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24">regulation, latency, and</text>
  <text x="94" y="310" fill="#44515D" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24">reliability matter.</text>

  <rect x="550" y="54" width="650" height="78" rx="20" fill="#DCE8F3" stroke="#AFC0D2" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="590" cy="93" r="14" fill="#355E85"/>
  <text x="620" y="84" fill="#355E85" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="2">01</text>
  <text x="620" y="106" fill="#17202A" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="30" font-weight="700">AI governance</text>
  <text x="900" y="106" fill="#41515E" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22">Make ML reviewable</text>

  <rect x="550" y="144" width="650" height="78" rx="20" fill="#E3EDD7" stroke="#BDCFB0" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="590" cy="183" r="14" fill="#557846"/>
  <text x="620" y="174" fill="#557846" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="2">02</text>
  <text x="620" y="196" fill="#17202A" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="30" font-weight="700">Quant systems</text>
  <text x="900" y="196" fill="#41515E" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22">Work where latency matters</text>

  <rect x="550" y="234" width="650" height="78" rx="20" fill="#F8F0DC" stroke="#DCC99F" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="590" cy="273" r="14" fill="#A7771A"/>
  <text x="620" y="264" fill="#A7771A" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="2">03</text>
  <text x="620" y="286" fill="#17202A" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="30" font-weight="700">Agent evaluation</text>
  <text x="900" y="286" fill="#41515E" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22">Measure before release</text>

  <text x="92" y="338" fill="#6A5B4A" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="1">NEW YORK  •  OPEN SOURCE  •  EVIDENCE OVER HYPE</text>
</svg>
